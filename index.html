<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ARCHIVE - Bio-Link V5.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000000; color: #00ff9f; font-family: 'Share Tech Mono', monospace; overflow-x: hidden; }
        .neon-border { border: 1px solid #00ff9f; box-shadow: 0 0 10px rgba(0,255,159,0.2); }
        .bar-bg { background: #111; height: 6px; border: 1px solid #333; width: 60px; }
        .bar-fill { height: 100%; transition: width 0.4s; }
        
        /* SLOT FISSI E QUADRATI */
        .slot { width: 100%; aspect-ratio: 1 / 1; background: rgba(0,255,159,0.02); border: 1px solid #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .slot img { width: 80%; height: 80%; object-fit: contain; }

        .rarity-common { border-bottom: 3px solid #666; }
        .rarity-rare { border-bottom: 3px solid #0070dd; }
        
        /* PULSAZIONE ARANCIONE PER LEGENDARY */
        @keyframes pulse-orange {
            0% { filter: drop-shadow(0 0 5px #ff8000); transform: scale(1); }
            50% { filter: drop-shadow(0 0 15px #ff8000); transform: scale(1.05); }
            100% { filter: drop-shadow(0 0 5px #ff8000); transform: scale(1); }
        }
        .rarity-legendary { border-bottom: 3px solid #ff8000; background: rgba(255, 128, 0, 0.05); box-shadow: 0 0 15px rgba(255,128,0,0.2); }
        .rarity-legendary img { animation: pulse-orange 2s infinite ease-in-out; }
        
        /* STILE LOG DI SISTEMA */
        #systemLog { background: rgba(0, 255, 159, 0.05); border-left: 2px solid #00ff9f; padding: 5px 10px; font-size: 9px; height: 30px; display: flex; align-items: center; overflow: hidden; }
        #logText::before { content: "> "; }

        .modal { background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); display: none !important; }
        .active-tab { background: #00ff9f; color: #000; box-shadow: 0 0 15px #00ff9f; }
        
        /* SPLASH SCREEN */
        #bioLock { transition: opacity 0.8s ease-in-out; }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen">

    <div id="bioLock" class="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center p-8 transition-opacity duration-1000">
    <div class="flex flex-col items-start w-full max-w-[450px]"> <div class="text-[10px] tracking-[0.4em] text-green-500 mb-2 font-bold uppercase opacity-80 animate-pulse">
            Establishing Neural Link...
        </div>
        
        <div class="w-full h-4 bg-zinc-950 border border-green-900/30 neon-border overflow-hidden relative">
            <div id="loadBar" class="h-full bg-green-500 w-0 transition-all duration-[2000ms] shadow-[0_0_15px_#00ff9f]"></div>
        </div>

        <div class="w-full flex justify-between mt-4">
            <div class="text-[8px] text-green-800 uppercase italic">Kitsune_OS // Kernel_V5.5</div>
            <div id="loadPercent" class="text-[10px] text-green-500 font-bold">0%</div>
        </div>
    </div>
</div>

    <div id="appBody" class="opacity-0 transition-opacity duration-1000">
        <header class="flex justify-between items-start mb-4 p-2 border-b border-zinc-800">
            <div>
                <h2 class="text-[8px] uppercase opacity-50">Net_ID: Kitsune</h2>
                <div class="text-xl font-bold">LVL <span id="lvlDisplay">1</span></div>
            </div>
            <div class="flex flex-col gap-2">
                <div class="flex items-center gap-2">
                    <span class="text-[7px] w-6">HP</span>
                    <button onclick="adjustStat('hp', -5)" class="text-[10px] bg-zinc-900 w-5 border border-zinc-800">-</button>
                    <div class="bar-bg"><div id="hpBar" class="bar-fill bg-red-600"></div></div>
                    <button onclick="adjustStat('hp', 5)" class="text-[10px] bg-zinc-900 w-5 border border-zinc-800">+</button>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-[7px] w-6">FOOD</span>
                    <button onclick="adjustStat('hunger', -5)" class="text-[10px] bg-zinc-900 w-5 border border-zinc-800">-</button>
                    <div class="bar-bg"><div id="hungerBar" class="bar-fill bg-orange-500"></div></div>
                    <button onclick="adjustStat('hunger', 5)" class="text-[10px] bg-zinc-900 w-5 border border-zinc-800">+</button>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-[7px] w-6">REST</span>
                    <button onclick="adjustStat('sleep', -5)" class="text-[10px] bg-zinc-900 w-5 border border-zinc-800">-</button>
                    <div class="bar-bg"><div id="sleepBar" class="bar-fill bg-blue-500"></div></div>
                    <button onclick="adjustStat('sleep', 5)" class="text-[10px] bg-zinc-900 w-5 border border-zinc-800">+</button>
                </div>
            </div>
        </header>

        <div id="avatarArea" class="flex gap-2 mb-4 h-80">
            <div id="bioMonitor" class="w-[38%] flex flex-col gap-2 items-center justify-center p-2 border border-zinc-900 bg-zinc-950 rounded-lg">
                <div class="text-center">
                    <img src="https://i.pinimg.com/originals/2e/1b/83/2e1b83d7345479257faf16e22c0b587d.gif" class="w-32 h-32 grayscale brightness-[1.5] object-contain">
                    <span class="text-[8px] block opacity-40 uppercase">Neural_Sync</span>
                </div>
                <div class="w-full h-px bg-zinc-800"></div>
                <div class="text-center">
                    <img src="https://media1.tenor.com/m/NZ0zSz551w4AAAAC/life-heart.gif" class="w-32 h-16 grayscale brightness-[1.2] object-contain">
                    <span class="text-[8px] block opacity-40 uppercase">Heart_Rate</span>
                </div>
            </div>

            <div class="w-[48%] relative border border-zinc-900 bg-zinc-950 rounded-lg overflow-hidden flex justify-center items-center">
                <div class="absolute inset-0 opacity-10 bg-[radial-gradient(circle,_#00ff9f_1px,_transparent_1px)] bg-[size:15px_15px]"></div>
                <img src="avatar.png" id="mainAvatar" onerror="this.src='https://i.imgur.com/k6R2T2B.png';" class="h-[85%] z-10 drop-shadow-[0_0_15px_rgba(0,255,159,0.3)] object-contain p-2">
                <div class="absolute bottom-2 left-2 text-[10px] bg-black/80 px-2 py-1 border border-zinc-800">
                    SAVED: <span id="totalSaved" class="text-orange-500">0</span> VC
                </div>
            </div>

            <div class="flex flex-col gap-1 w-12">
                <button onclick="setTab('outfit')" id="t-outfit" class="flex-1 text-[9px] border border-zinc-800 active-tab font-bold uppercase">Outfit</button>
                <button onclick="setTab('bank')" id="t-bank" class="flex-1 text-[9px] border border-zinc-800 font-bold uppercase">Bank</button>
                <button onclick="setTab('accessory')" id="t-accessory" class="flex-1 text-[9px] border border-zinc-800 font-bold uppercase">ACC</button>
            </div>
        </div>

        <div id="systemLog" class="mb-4"><span id="logText" class="tracking-tighter uppercase text-[8px] opacity-70">Sistema pronto.</span></div>

        <div class="flex-grow pb-24">
            <h3 class="text-[10px] opacity-30 uppercase mb-2 tracking-widest">Database_Items</h3>
            <div id="inventoryGrid" class="grid grid-cols-3 gap-3"></div>
        </div>

        <button onclick="openAddModal()" class="fixed bottom-6 right-6 w-14 h-14 rounded-full bg-green-600 text-black text-3xl shadow-2xl z-40 neon-border">+</button>
    </div>

    <div id="detailModal" class="modal fixed inset-0 z-50 p-6 flex items-center justify-center">
        <div class="w-full max-w-sm neon-border bg-black p-6 relative">
            <button onclick="closeDetail()" class="absolute top-2 right-4 text-2xl">×</button>
            <div class="w-full h-64 bg-zinc-950 border border-zinc-900 mb-4 flex items-center justify-center p-4"><img id="detailImg" class="max-h-full max-w-full object-contain"></div>
            <h2 id="detailName" class="text-xl font-bold uppercase mb-1"></h2>
            <p id="detailRarity" class="text-[10px] uppercase mb-4 opacity-70"></p>
            <div class="flex justify-between items-center border-t border-zinc-800 pt-4">
                <span class="text-lg text-orange-500 font-bold"><span id="detailCost">0</span> VC</span>
                <button id="deleteBtn" class="bg-red-950 text-red-500 text-[10px] px-4 py-2 uppercase border border-red-900">Purge</button>
            </div>
        </div>
    </div>

    <div id="addModal" class="modal fixed inset-0 z-50 p-6 flex items-center justify-center">
        <div class="w-full max-w-sm bg-zinc-900 p-6 border border-zinc-700 shadow-2xl">
            <input type="text" id="inName" placeholder="NOME ITEM" class="w-full bg-black p-3 mb-2 text-sm border border-zinc-800 outline-none">
            <input type="number" id="inCost" placeholder="VALORE VC" class="w-full bg-black p-3 mb-2 text-sm border border-zinc-800 outline-none">
            <select id="inRarity" class="w-full bg-black p-3 mb-2 text-sm border border-zinc-800 outline-none">
                <option value="common">COMMON</option>
                <option value="rare">RARE</option>
                <option value="legendary">LEGENDARY</option>
            </select>
            <select id="inCat" class="w-full bg-black p-3 mb-4 text-sm border border-zinc-800 outline-none">
                <option value="outfit">OUTFIT</option>
                <option value="bank">BANK</option>
                <option value="accessory">ACCESSORY</option>
            </select>
            <input type="file" id="inImg" class="text-[10px] mb-6">
            <div class="flex gap-2">
                <button onclick="saveItem()" class="flex-1 bg-green-600 text-black py-3 font-bold uppercase text-xs">Register</button>
                <button onclick="closeAddModal()" class="flex-1 bg-zinc-800 py-3 text-xs">Abort</button>
            </div>
        </div>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('cyber_state')) || { hp: 80, hunger: 50, sleep: 30, lvl: 1 };
        let items = JSON.parse(localStorage.getItem('cyber_items')) || [];
        let currentTab = 'outfit';

        const phrases = ["Link neurale stabile", "Kitsune online", "Nessuna intrusione rilevata", "Memoria ottimizzata", "Status: Silent Mode"];

        function updateLog(msg) {
            const log = document.getElementById('logText');
            log.innerText = msg || phrases[Math.floor(Math.random() * phrases.length)];
        }

        function adjustStat(stat, val) { state[stat] = Math.min(100, Math.max(0, state[stat] + val)); save(); renderStats(); }
        function save() { localStorage.setItem('cyber_state', JSON.stringify(state)); localStorage.setItem('cyber_items', JSON.stringify(items)); }
        
        function renderStats() {
            document.getElementById('hpBar').style.width = state.hp + '%';
            document.getElementById('hungerBar').style.width = state.hunger + '%';
            document.getElementById('sleepBar').style.width = state.sleep + '%';
            document.getElementById('lvlDisplay').innerText = state.lvl;
            let total = 0; items.forEach(i => total += i.cost);
            document.getElementById('totalSaved').innerText = total;
            state.lvl = Math.floor(total / 500) + 1;
        }

        function saveItem() {
            const file = document.getElementById('inImg').files[0];
            if(!file || !document.getElementById('inName').value) return alert("Missing data!");
            const reader = new FileReader();
            reader.onload = (e) => {
                items.push({ id: Date.now(), name: document.getElementById('inName').value, cost: parseInt(document.getElementById('inCost').value) || 0, rarity: document.getElementById('inRarity').value, category: document.getElementById('inCat').value, img: e.target.result });
                save(); renderInventory(); closeAddModal(); updateLog("Nuovo loot archiviato.");
            };
            reader.readAsDataURL(file);
        }

        function renderInventory() {
            const grid = document.getElementById('inventoryGrid');
            const filtered = items.filter(i => i.category === currentTab);
            grid.innerHTML = filtered.map(i => `
                <div class="slot rarity-${i.rarity}" onclick="openDetail(${i.id})">
                    <img src="${i.img}">
                    <div class="absolute bottom-0 w-full bg-black/60 text-[6px] py-1 truncate text-center uppercase font-bold">${i.name}</div>
                </div>
            `).join('');
            renderStats();
        }

        function openDetail(id) {
            const item = items.find(i => i.id === id);
            document.getElementById('detailImg').src = item.img;
            document.getElementById('detailName').innerText = item.name;
            document.getElementById('detailCost').innerText = item.cost;
            document.getElementById('detailRarity').innerText = 'RANK: ' + item.rarity;
            document.getElementById('detailModal').style.setProperty('display', 'flex', 'important');
            document.getElementById('deleteBtn').onclick = () => { if(confirm("Purge data?")) { items = items.filter(i => i.id !== id); save(); renderInventory(); closeDetail(); updateLog("Dati epurati."); } };
        }

        function closeDetail() { document.getElementById('detailModal').style.setProperty('display', 'none', 'important'); }
        function openAddModal() { document.getElementById('addModal').style.setProperty('display', 'flex', 'important'); }
        function closeAddModal() { document.getElementById('addModal').style.setProperty('display', 'none', 'important'); }
        
        function setTab(t) { 
            currentTab = t; 
            document.querySelectorAll('button[id^="t-"]').forEach(b => b.classList.remove('active-tab')); 
            document.getElementById('t-'+t).classList.add('active-tab'); 
            renderInventory(); 
        }

       window.onload = () => {
    renderStats();
    renderInventory();

    // Avvio caricamento
    setTimeout(() => {
        const bar = document.getElementById('loadBar');
        const percentText = document.getElementById('loadPercent');
        bar.style.width = '100%';
        
        // Animazione numerica 0-100%
        let count = 0;
        let interval = setInterval(() => {
            count++;
            percentText.innerText = count + '%';
            if(count >= 100) clearInterval(interval);
        }, 20); // 20ms * 100 = 2 secondi totali

        setTimeout(() => {
            document.getElementById('bioLock').style.opacity = '0';
            document.getElementById('appBody').style.opacity = '1';
            setTimeout(() => {
                document.getElementById('bioLock').style.display = 'none';
                updateLog();
            }, 800);
        }, 2300); // Leggermente più lungo per far godere il 100%
    }, 500);

    setInterval(() => updateLog(), 10000);
};
    </script>
</body>
</html>
